<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To my hardworking man</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reenie+Beanie&family=Tajawal:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f7f1e3; 
            --text-color: #4a4a4a; 
            --accent-color: #8e7d6a; 
            --paper-texture: url('https://www.transparenttextures.com/patterns/parchment.png'); 
        }

        body {
            background-color: var(--bg-color);
            background-image: var(--paper-texture); 
            color: var(--text-color);
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; 
        }

        .container {
            max-width: 800px; width: 90%; margin-top: 50px;
            text-align: center; animation: fadeIn 2s ease;
        }

        h1 {
            font-family: 'Reenie Beanie', cursive;
            font-size: 4rem; margin-bottom: 5px; color: var(--text-color);
        }

        .subtitle {
            font-style: italic; font-family: 'Amiri', serif;
            opacity: 0.7; margin-bottom: 40px; font-size: 1.1rem;
        }

        .personal-message {
            line-height: 2; font-size: 1.2rem; margin-bottom: 40px;
            text-align: center; padding: 0 20px; min-height: 60px;
        }

        .envelope-container {
            position: relative; cursor: pointer;
            margin: 20px auto 100px auto; width: 300px;
            transition: transform 0.3s ease;
        }

        .envelope-container:hover { transform: scale(1.05); }

        .envelope {
            width: 100%; height: 200px;
            background: #e9e0d2; background-image: var(--paper-texture);
            border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            position: relative; border: 1px solid rgba(0,0,0,0.1);
        }

        .envelope::after { 
            content: ''; position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 150px solid transparent; border-right: 150px solid transparent;
            border-top: 100px solid rgba(0,0,0,0.05); 
        }

        #messageModal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(253, 250, 245, 0.98); 
            background-image: var(--paper-texture);
            z-index: 1000; justify-content: center; align-items: center;
            backdrop-filter: blur(5px); 
        }

        .modal-content {
            max-width: 500px; width: 85%; text-align: center;
            background: white; padding: 30px; border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); position: relative;
        }

        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 2rem; cursor: pointer; color: var(--accent-color); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <audio id="mySong" src="song.mp3" preload="auto"></audio>

    <div class="container">
        <h1>To my hardworking man</h1>
        <p class="subtitle">كل عام وأنت بقلبي.. يا أغلى شخص </p>

        <div class="personal-message">
            <p id="typedMessage"></p>
        </div>

        <div class="envelope-container" onclick="openMessage()">
            <div class="envelope">
                <span style="font-family: 'Amiri', serif; color: #6d6d6d; z-index: 10;">إفتحني ✨</span>
            </div>
        </div>
    </div>

    <div id="messageModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeMessage()">&times;</span>
            <h2 style="font-family: 'Amiri', serif; font-size: 2.2rem;">من قلبي لحبيبي</h2>
            <div style="font-size: 1.2rem; line-height: 2; color: #555;">
                <p>كل عام وانت بخير وصحة وسلامة<br>وياجعل ايامك القادمة كلها خير..</p>
                <p>ابسط شيء اقدمه لك هو دعوة من قلبي<br>ان الله يوفقك ويكتب لك الخير </p>
                <p style="font-weight: bold; color: var(--accent-color);">كل سنة وانت طيب حبيبي</p>
            </div>
        </div>
    </div>

    <script>
        const messageText = :
        let index = 0;
        function typeWriter() {
            if (index < messageText.length) {
                document.getElementById("typedMessage").innerHTML += messageText.charAt(index);
                index++;
                setTimeout(typeWriter, 70);
            }
        }
        window.onload = typeWriter;

        function openMessage() {
            var audio = document.getElementById("mySong");
            if(audio) audio.play();
            document.getElementById('messageModal').style.display = 'flex';
        }
        function closeMessage() {
            document.getElementById('messageModal').style.display = 'none';
        }
    </script>
</body>
</html>
