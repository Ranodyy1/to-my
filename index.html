<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To my hardworking man</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Reenie+Beanie&family=Tajawal&display=swap" rel="stylesheet">
    <style>
        body { background: #f7f1e3; color: #4a4a4a; font-family: 'Tajawal', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; margin-top: 50px; width: 90%; }
        h1 { font-family: 'Reenie Beanie', cursive; font-size: 3.5rem; margin: 10px 0; }
        .envelope-container { cursor: pointer; margin: 40px auto; width: 280px; height: 180px; background: #e9e0d2; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: relative; z-index: 10; }
        .envelope-container:active { transform: scale(0.95); }
        #messageModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { width: 80%; text-align: center; padding: 20px; border: 1px solid #ddd; border-radius: 15px; }
    </style>
</head>
<body>
    <audio id="mySong" src="song.mp3" preload="auto"></audio>
    <div class="container">
        <h1>To my hardworking man</h1>
        <p id="typedMessage" style="min-height: 50px;"></p>
        <div class="envelope-container" onclick="openMessage()">
            <span style="font-family: 'Amiri', serif;">إفتحني ✨</span>
        </div>
    </div>
    <div id="messageModal">
        <div class="modal-content">
            <h2 style="font-family: 'Amiri', serif;">من قلبي لحبيبي</h2>
            <p>كل عام وانت بخير وصحة وسلامة<br>ياجعل ايامك القادمة كلها خير..</p>
            <button onclick="closeMessage()" style="margin-top:20px; padding:10px 20px;">إغلاق</button>
        </div>
    </div>
    <script>
        const text = "ماكان ودي اقولها بطريقة عادية مثل باقي الناس..";
        let i = 0;
        function type() { if (i < text.length) { document.getElementById("typedMessage").innerHTML += text.charAt(i); i++; setTimeout(type, 70); } }
        window.onload = type;
        function openMessage() { 
            document.getElementById("mySong").play().catch(e => console.log("Audio play failed"));
            document.getElementById('messageModal').style.display = 'flex'; 
        }
        function closeMessage() { document.getElementById('messageModal').style.display = 'none'; }
    </script>
</body>
</html>
